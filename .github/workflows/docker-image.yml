name: Build and Publish Docker Image

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to apply (e.g. 0.98.0). Leave blank to tag as "manual" only.'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: sprouttrack/sprout-track

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ---------------------------------------------------
      # 1. Checkout the repo at the release tag
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # 2. Set up QEMU for cross-platform emulation (ARM)
      # ---------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ---------------------------------------------------
      # 3. Set up Docker Buildx for multi-platform builds
      # ---------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------------------------------------------------
      # 4. Log in to Docker Hub
      # ---------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------------------------------
      # 5. Extract version metadata from the release tag
      # ---------------------------------------------------
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # On release: use the semver tag (e.g. v0.96.30 → 0.96.30)
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            # On manual dispatch with a version provided
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
            # Always tag latest
            type=raw,value=latest

      # ---------------------------------------------------
      # 6. Build and push multi-platform image
      # ---------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
