# Sprout Track - Local Testing (SQLite)
#
# Builds from local source with no cache:
#   docker compose -f docker-compose.test.yml up -d --build
#
# Clean up:
#   docker compose -f docker-compose.test.yml down -v

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_NOTIFICATIONS: "true"
    image: sprout-track:local-test
    container_name: sprout-track-test
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - test-db-data:/db
      - test-env-data:/app/env
      - test-files:/app/Files
    environment:
      - NODE_ENV=production
      - DATABASE_PROVIDER=sqlite
      - ENABLE_NOTIFICATIONS=true

volumes:
  test-db-data:
    name: sprout-track-test-db
  test-env-data:
    name: sprout-track-test-env
  test-files:
    name: sprout-track-test-files
