# Sprout Track - Local Testing (PostgreSQL)
#
# Builds from local source with no cache:
#   docker compose -f docker-compose.test-postgres.yml up -d --build
#
# Clean up:
#   docker compose -f docker-compose.test-postgres.yml down -v

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENABLE_NOTIFICATIONS: "true"
        DATABASE_PROVIDER: postgresql
    image: sprout-track-pg:local-test
    container_name: sprout-track-test
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - test-env-data:/app/env
      - test-files:/app/Files
    environment:
      - NODE_ENV=production
      - DATABASE_PROVIDER=postgresql
      - DATABASE_URL=postgresql://sprout:sprout@postgres:5432/sprout_track
      - LOG_DATABASE_URL=postgresql://sprout:sprout@postgres:5432/sprout_track
      - ENABLE_NOTIFICATIONS=true
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: sprout-track-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sprout
      POSTGRES_PASSWORD: sprout
      POSTGRES_DB: sprout_track
    volumes:
      - test-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U sprout"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  test-pg-data:
    name: sprout-track-test-pg-data
  test-env-data:
    name: sprout-track-test-env
  test-files:
    name: sprout-track-test-files
